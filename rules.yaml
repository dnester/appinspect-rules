    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: print("...\($VAR)...")
    - pattern: NSLog("...\($VAR)...")
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(password|passwd|secret|token|apiKey|credential|auth).*

# ===================================================
# Command Injection (CWE-78)
# ===================================================

- id: swift-command-injection-process
  message: >-
    Dynamic argument passed to Process/NSTask launch. If the argument derives from
    user input, an attacker can inject arbitrary OS commands. Validate and allowlist
    all arguments before passing them to a subprocess.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-78: Improper Neutralization of Special Elements used in an OS Command'
    owasp:
    - A03:2021 - Injection
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      let $P = Process()
      ...
      $P.arguments = $ARGS
  - pattern: |
      $PROC.launchPath = $PATH
      ...
      $PROC.launch()
  - pattern: |
      Process.launchedProcess(launchPath: $PATH, arguments: $ARGS)
  - pattern: |
      $TASK = NSTask()
      ...
      $TASK.launch()

- id: swift-command-injection-shell
  message: >-
    Shell execution via a string-based API detected. Passing unvalidated user input
    to shell commands enables command injection (CWE-78). Use Process() with an
    explicit argument array instead of a shell interpreter.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-78: Improper Neutralization of Special Elements used in an OS Command'
    owasp:
    - A03:2021 - Injection
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      $P.launchPath = "/bin/sh"
  - pattern: |
      $P.launchPath = "/bin/bash"
  - pattern: |
      $P.launchPath = "/usr/bin/env"
  - pattern: shell($CMD)
  - pattern: runShellCommand($CMD)

# ===================================================
# Password Hash With Insufficient Computational Effort (CWE-916)
# ===================================================

- id: swift-weak-password-hashing
  message: >-
    MD5 or SHA-1 used for password hashing. These algorithms are too fast for
    password storage - attackers can brute-force them in seconds. Use a
    purpose-built password hashing function such as bcrypt, scrypt, or Argon2
    (via CryptoKit's HKDF or a third-party library).
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-916: Use of Password Hash With Insufficient Computational Effort'
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    owasp:
    - A02:2021 - Cryptographic Failures
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        Insecure.MD5.hash(data: $DATA)
    - pattern: |
        Insecure.SHA1.hash(data: $DATA)
    - pattern: CC_MD5($DATA, $LEN, $DIGEST)
    - pattern: CC_SHA1($DATA, $LEN, $DIGEST)
  - metavariable-regex:
      metavariable: $DATA
      regex: (?i).*(password|passwd|pass|pwd|credential|secret).*

- id: swift-weak-password-hashing-generic
  message: >-
    A fast cryptographic hash (MD5/SHA1) is being computed on a value whose name
    suggests it may be a password or credential. Fast hashes are not suitable for
    password storage. Use bcrypt, scrypt, or Argon2 instead.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: HIGH
    confidence: LOW
    category: security
    cwe:
    - 'CWE-916: Use of Password Hash With Insufficient Computational Effort'
    owasp:
    - A02:2021 - Cryptographic Failures
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        var $HASH = MD5($VAR)
    - pattern: |
        let $HASH = $VAR.md5
    - pattern: |
        let $HASH = $VAR.sha1
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(password|passwd|pass|pwd|credential|secret).*

# ===================================================
# Path Traversal (CWE-23)
# ===================================================

- id: swift-path-traversal-file-url
  message: >-
    File URL constructed from a variable without path sanitization. If the value
    derives from user input and contains "../" sequences, an attacker can read or
    write files outside the intended directory (path traversal). Validate and
    normalize paths using URL.standardized and containment checks before use.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-23: Relative Path Traversal'
    owasp:
    - A01:2021 - Broken Access Control
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      URL(fileURLWithPath: $PATH + $USER)
  - pattern: |
      URL(fileURLWithPath: "\($USER)")
  - pattern: ($BASE as NSString).appendingPathComponent($USER)
  - pattern: $BASE.appendingPathComponent($USER)

- id: swift-path-traversal-filemanager
  message: >-
    FileManager operation uses a path containing string concatenation or interpolation.
    Without sanitization this can lead to path traversal (CWE-23). Always resolve
    paths to their canonical form and verify they remain within the intended base directory.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-23: Relative Path Traversal'
    owasp:
    - A01:2021 - Broken Access Control
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      FileManager.default.contents(atPath: $BASE + $SUFFIX)
  - pattern: |
      FileManager.default.createFile(atPath: $BASE + $SUFFIX, ...)
  - pattern: |
      FileManager.default.removeItem(atPath: $BASE + $SUFFIX)
  - pattern: |
      FileManager.default.copyItem(atPath: $BASE + $SUFFIX, ...)

# ===================================================
# Server-Side Request Forgery (CWE-918)
# ===================================================

- id: swift-ssrf-url-from-input
  message: >-
    A URL is constructed from a variable and immediately used in a network request.
    If the URL value originates from user input or an untrusted source, an attacker
    can make the app issue requests to arbitrary internal or external hosts (SSRF).
    Validate the scheme, host, and path against an allowlist before making requests.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-918: Server-Side Request Forgery (SSRF)'
    owasp:
    - A10:2021 - Server-Side Request Forgery
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - patterns:
      - pattern: |
          let $URL = URL(string: $INPUT)
          ...
          URLSession.$SESSION.dataTask(with: $URL, ...)
      - pattern-not: |
          let $URL = URL(string: "...")
    - patterns:
      - pattern: |
          URLSession.$SESSION.dataTask(with: URL(string: $INPUT)!, ...)
      - pattern-not: |
          URLSession.$SESSION.dataTask(with: URL(string: "..."), ...)

- id: swift-ssrf-urlrequest-dynamic
  message: >-
    URLRequest constructed with a dynamically-built URL. Unvalidated host or path
    components sourced from external data can enable SSRF attacks. Verify the
    final URL against an allowlist of permitted hosts before sending the request.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: LOW
    category: security
    cwe:
    - 'CWE-918: Server-Side Request Forgery (SSRF)'
    owasp:
    - A10:2021 - Server-Side Request Forgery
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      URLRequest(url: $URL)
  - pattern-not: |
      URLRequest(url: URL(string: "..."))

# ===================================================
# Cross-site Scripting / XSS (CWE-79)
# ===================================================

- id: swift-xss-webview-load-html
  message: >-
    WKWebView is loading an HTML string that may contain user-controlled content.
    Injecting untrusted data into loadHTMLString without sanitization enables
    Cross-site Scripting (XSS). Sanitize all dynamic content or use a Content
    Security Policy to restrict executable script sources.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation'
    owasp:
    - A03:2021 - Injection
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      $WEB.loadHTMLString($HTML, baseURL: $BASE)
  - pattern: |
      $WEB.loadHTMLString("\(...\($VAR)...)", baseURL: $BASE)

- id: swift-xss-webview-evaluate-js
  message: >-
    evaluateJavaScript called with a dynamic string. If the JavaScript string
    incorporates user-supplied data without escaping, this is a stored or reflected
    XSS vector. Escape all user data before embedding it in JavaScript strings,
    or use WKScriptMessageHandler to pass structured data instead.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation'
    owasp:
    - A03:2021 - Injection
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: $WEB.evaluateJavaScript($JS, ...)
  - pattern-not: $WEB.evaluateJavaScript("...", ...)

# ===================================================
# XML External Entity Injection / XXE (CWE-611)
# ===================================================

- id: swift-xxe-xmlparser-external-entities
  message: >-
    XMLParser may resolve external entities by default. Parsing attacker-controlled
    XML with external entity resolution enabled can leak local files or trigger SSRF
    (XXE). Set shouldResolveExternalEntities = false and shouldProcessNamespaces = false
    before parsing any untrusted XML.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-611: Improper Restriction of XML External Entity Reference'
    owasp:
    - A05:2021 - Security Misconfiguration
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      XMLParser(data: $DATA)
  - pattern-not-inside: |
      $PARSER.shouldResolveExternalEntities = false

- id: swift-xxe-xmldocument
  message: >-
    XMLDocument initialized without explicitly disabling external entity resolution.
    When parsing untrusted XML this can lead to XXE attacks. Pass
    XMLNode.Options.nodeLoadExternalEntitiesNever or equivalent options, and
    avoid NSXMLDocumentTidyXML which can trigger network fetches.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-611: Improper Restriction of XML External Entity Reference'
    owasp:
    - A05:2021 - Security Misconfiguration
    subcategory:
    - audit
    technology:
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: |
      XMLDocument(data: $DATA, options: $OPTS, ...)
  - pattern: |
      XMLDocument(xmlString: $STR, options: $OPTS, ...)

# ===================================================
# Sensitive Cookie Without Secure Attribute (CWE-614)
# ===================================================

- id: swift-insecure-cookie-no-secure-flag
  message: >-
    HTTPCookie created without the 'isSecure' attribute set to true. Cookies without
    the Secure flag can be transmitted over unencrypted HTTP connections, allowing
    network attackers to intercept session tokens or credentials. Always set
    NSHTTPCookieSecure (isSecure: true) for cookies carrying sensitive data.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-614: Sensitive Cookie in HTTPS Session Without Secure Attribute'
    owasp:
    - A05:2021 - Security Misconfiguration
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      HTTPCookie(properties: $PROPS)
  - pattern-not-inside: |
      $PROPS[HTTPCookiePropertyKey.secure] = true
  - pattern-not-inside: |
      $PROPS[.secure] = true

- id: swift-insecure-cookie-no-httponly
  message: >-
    HTTPCookie created without the HTTPOnly attribute. Without HTTPOnly, JavaScript
    running in a WebView can read the cookie value, enabling session hijacking via XSS.
    Set NSHTTPCookieHTTPOnly (isHTTPOnly: true) for session and authentication cookies.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-614: Sensitive Cookie in HTTPS Session Without Secure Attribute'
    - 'CWE-79: Improper Neutralization of Input During Web Page Generation'
    owasp:
    - A05:2021 - Security Misconfiguration
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern: |
    HTTPCookie(properties: $PROPS)

