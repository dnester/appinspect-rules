# version: 1.0.0
rules:
# ===================================================
# M1: Improper Credential Usage - Hardcoded Secrets
# ===================================================

- id: swift-hardcoded-api-keys
  message: >-
    Hardcoded API key detected. API keys should be stored securely using environment variables,
    configuration files excluded from version control, or the iOS Keychain for runtime secrets.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    - 'CWE-547: Use of Hard-coded, Security-relevant Constants'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
    - pattern: |
        let $VAR: String = "$VALUE"
    - pattern: |
        var $VAR: String = "$VALUE"
    - pattern: |
        static let $VAR = "$VALUE"
    - pattern: |
        private let $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^(sk_test_|sk_live_|pk_test_|pk_live_|rk_test_|rk_live_|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35}|ya29\.|1\/\/[0-9A-Za-z\-_]{43}|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|ghu_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|ghr_[A-Za-z0-9]{36}).*

- id: swift-hardcoded-jwt-tokens
  message: >-
    Hardcoded JWT token detected. JWT tokens contain sensitive authentication information
    and should never be hardcoded. Store them securely in Keychain or retrieve them dynamically.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
    - pattern: |
        let $VAR: String = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^eyJ[A-Za-z0-9_=-]+\.eyJ[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+$

- id: swift-hardcoded-base64-secrets
  message: >-
    Suspicious Base64 encoded string detected that may contain hardcoded secrets.
    Verify this is not sensitive data and consider using secure storage mechanisms.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^[A-Za-z0-9+/]{40,}={0,2}$

- id: swift-urls-with-credentials
  message: >-
    URL contains embedded credentials which poses a significant security risk.
    Credentials in URLs may be logged, cached, or exposed in various ways. Use secure authentication methods instead.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$PROTOCOL://$USER:$PASS@$REST"
    - pattern: |
        var $VAR = "$PROTOCOL://$USER:$PASS@$REST"
    - pattern: |
        URL(string: "$PROTOCOL://$USER:$PASS@$REST")

- id: swift-hardcoded-credentials
  message: "Potential hardcoded credential detected - store secrets securely using Keychain or secure configuration"
  severity: ERROR
  metadata:
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    owasp:
    - A07:2021 - Identification and Authentication Failures
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
    - pattern: let $VAR = "$CREDENTIAL"
    - metavariable-regex:
        metavariable: $CREDENTIAL
        regex: (?i).*(password|secret|token|key|api_key|apikey|auth|credential|pass).*

- id: swift-hardcoded-passwords-generic
  message: >-
    Hardcoded password or secret detected. Passwords and secrets should never be
    hardcoded in source code as they can be easily extracted from app binaries.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    - 'CWE-259: Use of Hard-coded Password'
    - 'CWE-547: Use of Hard-coded, Security-relevant Constants'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(password|secret|key|token|credential).*
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^.{8,}$

- id: swift-aws-access-key-pattern
  message: >-
    AWS Access Key pattern detected. AWS credentials should be managed through IAM roles,
    environment variables, or secure credential providers, not hardcoded in source.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^AKIA[0-9A-Z]{16}$

- id: swift-firebase-api-key
  message: >-
    Firebase API key detected. While Firebase keys are often public, ensure proper
    security rules are configured on the Firebase backend to prevent unauthorized access.
  severity: WARNING
  metadata:
    likelihood: HIGH
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^AIza[0-9A-Za-z\-_]{35}$

- id: swift-github-token-pattern
  message: >-
    GitHub token detected. GitHub tokens provide access to repositories and should
    be stored securely using environment variables or secure credential management.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-798: Use of Hard-coded Credentials'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$VALUE"
    - pattern: |
        var $VAR = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: ^ghp_[A-Za-z0-9]{36}$

# ===================================================
# M3: Insecure Authentication/Authorization
# ===================================================

- id: swift-biometric-auth-without-fallback
  message: >-
    Biometric authentication configured without proper fallback mechanism.
    Use deviceOwnerAuthentication policy to include device passcode as fallback,
    ensuring users aren't locked out if biometrics fail.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-287: Improper Authentication'
    - 'CWE-306: Missing Authentication for Critical Function'
    masvs:
    - 'MASVS-AUTH-1: The app uses secure authentication mechanisms'
    owasp:
    - M3:2024 - Insecure Authentication/Authorization
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      LAPolicy.deviceOwnerAuthenticationWithBiometrics

- id: swift-biometric-no-fallback
  message: "Biometric authentication without fallback - consider deviceOwnerAuthentication policy for better UX"
  severity: WARNING
  metadata:
    category: security
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern: LAPolicy.deviceOwnerAuthenticationWithBiometrics

- id: swift-insecure-keychain-accessibility
  message: >-
    Insecure keychain accessibility configuration detected. Using kSecAttrAccessibleAlways
    or kSecAttrAccessibleAlwaysThisDeviceOnly allows access to keychain items even when
    device is locked, which poses security risks.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-284: Improper Access Control'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M3:2024 - Insecure Authentication/Authorization
    - M9:2024 - Insecure Data Storage
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        kSecAttrAccessibleAlways
    - pattern: |
        kSecAttrAccessibleAlwaysThisDeviceOnly

- id: swift-keychain-always-accessible
  message: "Keychain item accessible always - consider more restrictive access control for better security"
  severity: WARNING
  metadata:
    category: security
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern: kSecAttrAccessibleAlways

- id: swift-weak-biometric-authentication
  message: >-
    Weak biometric authentication configuration detected. Consider using stronger
    access control flags like .biometryCurrentSet or .applicationPassword for sensitive operations.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-306: Missing Authentication for Critical Function'
    masvs:
    - 'MASVS-AUTH-1: The app uses secure authentication mechanisms'
    owasp:
    - M3:2024 - Insecure Authentication/Authorization
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        .biometryAny
    - pattern: |
        SecAccessControlCreateWithFlags($ALLOCATOR, $PROTECTION, .biometryAny, $ERROR)

# ===================================================
# M4: Insufficient Input/Output Validation
# ===================================================

- id: swift-force-unwrapping
  message: >-
    Force unwrapping detected which can cause runtime crashes and potential security issues.
    Use safe unwrapping methods like optional binding, nil coalescing, or guard statements.
  severity: WARNING
  metadata:
    likelihood: HIGH
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-248: Uncaught Exception'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        $VAR!
    - pattern: |
        try! $EXPR

- id: swift-unsafe-pointer-usage
  message: >-
    Unsafe pointer operations detected. Improper use of unsafe pointers can lead to
    memory corruption, crashes, and potential security vulnerabilities including buffer overflows.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    - 'CWE-416: Use After Free'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        UnsafeRawPointer
    - pattern: |
        UnsafeMutableRawPointer

- id: swift-unsafe-pointer-usage-simple
  message: "Unsafe pointer usage detected - ensure proper memory management and bounds checking"
  severity: WARNING
  metadata:
    category: security
    cwe:
    - 'CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer'
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
    - pattern: UnsafePointer($VAR)
    - pattern: UnsafeMutablePointer($VAR)
    - pattern: UnsafeRawPointer($VAR)
    - pattern: UnsafeMutableRawPointer($VAR)

- id: swift-dynamic-string-formatting
  message: >-
    Dynamic string formatting detected which may be vulnerable to format string attacks
    or injection if user input is involved. Validate and sanitize all inputs used in string formatting.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-134: Use of Externally-Controlled Format String'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        String(format: $FORMAT, $ARGS)
    - pattern: |
        NSString(format: $FORMAT, $ARGS)
  - pattern-not: |
      String(format: "...", ...)

- id: swift-url-scheme-without-validation
  message: >-
    URL scheme handling detected without proper validation. Malicious apps can exploit
    custom URL schemes to trigger unintended actions. Validate all incoming URL parameters.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    masvs:
    - 'MASVS-PLATFORM-1: The app uses Inter Process Communication (IPC) mechanisms securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    - M8:2024 - Security Misconfiguration
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-regex: "func application\\(.*open url.*URL|openURLContexts|onOpenURL\\s*\\{"

- id: swift-data-validation-regex-injection
  message: >-
    Regular expression usage detected. Ensure regex patterns are not constructed from
    user input to prevent ReDoS (Regular Expression Denial of Service) attacks.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-1333: Inefficient Regular Expression Complexity'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        NSRegularExpression(pattern: $PATTERN, options: $OPTIONS)
    - pattern: |
        try NSRegularExpression(pattern: $PATTERN, options: $OPTIONS)
    - pattern: |
        $STRING.range(of: $PATTERN, options: .regularExpression)

- id: swift-insecure-serialization
  message: >-
    Insecure serialization method detected. NSKeyedArchiver/NSKeyedUnarchiver can execute
    arbitrary code during deserialization. Use secure alternatives like Codable for untrusted data.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-502: Deserialization of Untrusted Data'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        NSKeyedUnarchiver.unarchiveObject(with: $DATA)
    - pattern: |
        NSKeyedUnarchiver.unarchivedObject(ofClass: $CLASS, from: $DATA)
    - pattern: |
        try NSKeyedUnarchiver.unarchivedObject(ofClasses: $CLASSES, from: $DATA)

# ===================================================
# M5: Insecure Communication
# ===================================================

- id: swift-insecure-http-urls
  message: >-
    Insecure HTTP URL detected. All network communication should use HTTPS to prevent
    man-in-the-middle attacks and ensure data confidentiality. HTTP URLs expose data in transit.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-319: Cleartext Transmission of Sensitive Information'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $VAR = "$URL"
    - pattern: |
        var $VAR = "$URL"
    - pattern: |
        URL(string: "$URL")
    - pattern: |
        URLRequest(url: URL(string: "$URL")!)
  - metavariable-regex:
      metavariable: $URL
      regex: ^http://.*

- id: swift-insecure-http
  message: "Insecure HTTP URL detected - use HTTPS instead to encrypt data in transit"
  severity: WARNING
  metadata:
    category: security
    cwe:
    - 'CWE-319: Cleartext Transmission of Sensitive Information'
    owasp:
    - A02:2021 - Cryptographic Failures
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern: '"http://$URL"'

- id: swift-url-session-insecure-config
  message: >-
    URLSession configuration may bypass certificate validation. Disabling or weakening
    SSL/TLS validation makes the app vulnerable to man-in-the-middle attacks.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-295: Improper Certificate Validation'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        $CONFIG.urlCredentialStorage = nil
    - pattern: |
        URLCredential(trust: $TRUST)
    - pattern: |
        completionHandler(.performDefaultHandling, nil)

- id: swift-certificate-validation-disabled
  message: "Certificate validation may be disabled - ensure proper SSL/TLS validation for secure connections"
  severity: ERROR
  metadata:
    category: security
    cwe:
    - 'CWE-295: Improper Certificate Validation'
    owasp:
    - A02:2021 - Cryptographic Failures
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
    - pattern: URLSessionConfiguration.default.urlCredentialStorage = nil
    - pattern: challenge.protectionSpace.serverTrust

- id: swift-missing-certificate-pinning
  message: >-
    URLSession delegate implements certificate validation but may not include proper
    certificate pinning. Implement SSL/TLS certificate pinning to prevent MITM attacks.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-295: Improper Certificate Validation'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-regex: 'func urlSession\([^,)]+,\s*didReceive\s+challenge:\s*URLAuthenticationChallenge'
  - pattern-not-regex: 'challenge\.protectionSpace\.serverTrust'

- id: swift-app-transport-security-exception
  message: >-
    App Transport Security (ATS) exception detected. ATS exceptions weaken network security
    by allowing insecure connections. Ensure exceptions are justified and properly scoped.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-319: Cleartext Transmission of Sensitive Information'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    - M8:2024 - Security Misconfiguration
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        NSAllowsArbitraryLoads
    - pattern: |
        NSExceptionAllowsInsecureHTTPLoads
    - pattern: |
        NSExceptionMinimumTLSVersion

- id: swift-weak-tls-configuration
  message: >-
    Weak TLS configuration detected. Modern apps should enforce TLS 1.2 or higher
    and use strong cipher suites to ensure secure communication.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-326: Inadequate Encryption Strength'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        .tlsMinimumSupportedProtocol = tls_protocol_version_t(rawValue: $VERSION)!
    - pattern: |
        NSExceptionMinimumTLSVersion
  - metavariable-regex:
      metavariable: $VERSION
      regex: ^(769|770)$  # TLS 1.0 and 1.1

# ===================================================
# M7: Insufficient Binary Protections
# ===================================================

- id: swift-debug-logging-sensitive-data
  message: >-
    Sensitive data detected in debug logging statements. Debug logs may be accessible
    in crash reports, console logs, or system logs, potentially exposing sensitive information.
  severity: WARNING
  metadata:
    likelihood: HIGH
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-532: Insertion of Sensitive Information into Log File'
    masvs:
    - 'MASVS-CODE-2: The app implements appropriate logging'
    owasp:
    - M7:2024 - Insufficient Binary Protections
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - patterns:
      - pattern-either:
        - pattern: |
            print("...$VAR...")
        - pattern: |
            print($VAR)
        - pattern: |
            NSLog("...$VAR...", $VAR)
