  message: >-
    arc4random() usage detected. While arc4random() is cryptographically secure on modern iOS,
    consider using SecRandomCopyBytes for explicit cryptographic security guarantees.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator (PRNG)'
    masvs:
    - 'MASVS-CRYPTO-6: All random values are generated using a sufficiently secure random number generator'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      arc4random()

# ===================================================
# SQL Injection Detection
# ===================================================

- id: swift-potential-sqlite-injection
  message: >-
    Potential Client-side SQL injection which has different impacts depending on the SQL use-case. The
    impact may include the circumvention of local authentication mechanisms, obtaining of sensitive data
    from the app, or manipulation of client-side behavior. It wasn't possible to make certain that the
    source is untrusted, but the application should avoid concatenating dynamic data into SQL queries
    and should instead leverage parameterized queries.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs.'
    references:
    - https://developer.apple.com/library/archive/documentation/Security/Conceptual/SecureCodingGuide/Articles/ValidatingInput.html
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  mode: taint
  pattern-sources:
  - pattern-either:
    - pattern: |
        "...\($X)..."
    - pattern: |
        $SQL = "..." + $X
    - pattern: |
        $SQL = $X + "..."
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: sqlite3_exec($DB, $SQL, ...)
      - pattern: sqlite3_prepare_v2($DB, $SQL, ...)
    - focus-metavariable:
      - $SQL

- id: swift-sql-injection-risk
  message: "Potential SQL injection vulnerability - use parameterized queries instead of string concatenation"
  severity: ERROR
  metadata:
    category: security
    cwe:
    - 'CWE-89: Improper Neutralization of Special Elements used in an SQL Command'
    owasp:
    - A03:2021 - Injection
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
    - pattern: '"SELECT * FROM $TABLE WHERE $FIELD = \"" + $VAR + "\""'
    - pattern: '"INSERT INTO $TABLE VALUES (\"" + $VAR + "\")"'
    - pattern: '"UPDATE $TABLE SET $FIELD = \"" + $VAR + "\""'
    - pattern: '"DELETE FROM $TABLE WHERE $FIELD = \"" + $VAR + "\""'

# ===================================================
# CUSTOM RULES — AppInspect Extended Library
# Runtime Security, Privacy, Async/Combine, SwiftUI
# ===================================================

# --- Keychain & Secure Storage ---

- id: appinspect-keychain-backup-eligible
  message: >-
    Keychain item uses kSecAttrAccessibleWhenUnlocked (or AfterFirstUnlock) without
    ThisDeviceOnly, making it eligible for iCloud and local device backups. A stolen
    encrypted backup can be decrypted offline to extract keychain secrets.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - vuln
    technology:
    - ios
  languages:
  - swift
  pattern-either:
  - pattern: kSecAttrAccessibleWhenUnlocked
  - pattern: kSecAttrAccessibleAfterFirstUnlock
  - pattern: kSecAttrAccessibleWhenPasscodeSetThisDeviceOnly

- id: appinspect-keychain-no-access-group
  message: >-
    Keychain item added without kSecAttrAccessGroup. Without an explicit access group
    the item is accessible to all apps signed with the same team ID, violating least-privilege.
    Set kSecAttrAccessGroup to scope access to this app only.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-284: Improper Access Control'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  patterns:
  - pattern: SecItemAdd($QUERY, ...)
  - pattern-not-inside: |
      ... kSecAttrAccessGroup ...

- id: appinspect-secure-enclave-not-used
  message: >-
    Cryptographic key created without Secure Enclave protection. For signing or encryption
    keys protecting sensitive operations, use kSecAttrTokenIDSecureEnclave so the private
    key never leaves the hardware security module.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: HIGH
    confidence: LOW
    category: security
    cwe:
    - 'CWE-321: Use of Hard-coded Cryptographic Key'
    masvs:
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  patterns:
  - pattern: SecKeyCreateRandomKey($PARAMS, ...)
  - pattern-not-inside: |
      ... kSecAttrTokenIDSecureEnclave ...

# --- Cryptography ---

- id: appinspect-weak-pbkdf2-iterations
  message: >-
    PBKDF2 key derivation with potentially insufficient iteration count. NIST SP 800-132
    recommends ≥ 600,000 iterations for PBKDF2-HMAC-SHA256 in 2023. Low counts make
    offline dictionary attacks feasible.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-916: Use of Password Hash With Insufficient Computational Effort'
    masvs:
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: CCKeyDerivationPBKDF($ALGO, $PASSWORD, $PWDLEN, $SALT, $SALTLEN, $PRF, $ROUNDS, $DERIVEDKEY, $DERIVEDKEYLEN)
  - metavariable-comparison:
      metavariable: $ROUNDS
      comparison: $ROUNDS < 100000

- id: appinspect-ecb-mode-usage
  message: >-
    ECB (Electronic Codebook) cipher mode detected. ECB produces identical ciphertext
    for identical plaintext blocks, leaking data patterns. Use AES-GCM or CBC with
    a random IV via CryptoKit instead.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    masvs:
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: kCCOptionECBMode
  - pattern: "CCOptions(rawValue: 1)"

- id: appinspect-static-iv-aes
  message: >-
    AES encryption with what appears to be a static or hardcoded IV. A fixed IV with
    the same key completely breaks semantic security — an attacker can distinguish
    and correlate ciphertexts. Use SecRandomCopyBytes to generate a fresh IV per encryption.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-329: Generation of Predictable IV with CBC Mode'
    masvs:
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: |
        let $IV: [UInt8] = [...]
    - pattern: |
        var $IV: [UInt8] = [...]
  - metavariable-regex:
      metavariable: $IV
      regex: (?i).*(iv|nonce|initvec|initialization.?vector).*

- id: appinspect-deprecated-des-3des
  message: >-
    DES or 3DES cipher algorithm detected. Both are deprecated by NIST and considered
    insecure for modern use. Replace with AES-256-GCM using CryptoKit.
  severity: ERROR
  metadata:
    likelihood: LOW
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-327: Use of a Broken or Risky Cryptographic Algorithm'
    masvs:
    - 'MASVS-CRYPTO-1: The app uses cryptographic algorithms that are up to date and well-tested'
    owasp:
    - M10:2024 - Insufficient Cryptography
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: kCCAlgorithmDES
  - pattern: kCCAlgorithm3DES
  - pattern: CCAlgorithm(kCCAlgorithmDES)
  - pattern: CCAlgorithm(kCCAlgorithm3DES)

# --- Network & Communication ---

- id: appinspect-nsurlconnection-deprecated
  message: >-
    NSURLConnection is deprecated since iOS 9 and does not support modern TLS configuration,
    certificate pinning via URLSession delegates, or background transfers. Migrate to URLSession.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-477: Use of Obsolete Function'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: "NSURLConnection(request: $REQ, delegate: $DELEGATE)"
  - pattern: NSURLConnection.sendAsynchronousRequest($REQ, ...)
  - pattern: NSURLConnection.sendSynchronousRequest($REQ, ...)

- id: appinspect-sendbird-socket-unvalidated
  message: >-
    WebSocket connection initiated. Ensure the server certificate is validated and
    the endpoint URL is not controlled by user input. Unvalidated WebSocket origins
    can enable cross-site WebSocket hijacking.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-345: Insufficient Verification of Data Authenticity'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: "URLSessionWebSocketTask(with: $URL)"
  - pattern: "URLSession.shared.webSocketTask(with: $URL)"

- id: appinspect-urlsession-no-timeout
  message: >-
    URLSessionConfiguration created with no explicit timeoutIntervalForRequest or
    timeoutIntervalForResource. Without timeouts, a slow or unresponsive server can
    hang the app indefinitely, enabling denial-of-service.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: LOW
    category: security
    cwe:
    - 'CWE-400: Uncontrolled Resource Consumption'
    masvs:
    - 'MASVS-NETWORK-1: The app secures all network traffic'
    owasp:
    - M5:2024 - Insecure Communication
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: URLSessionConfiguration.default
  - pattern-not-inside: |
      $CONFIG.timeoutIntervalForRequest = ...

# --- Privacy & PII ---

- id: appinspect-uipasteboard-write-sensitive
  message: >-
    Data written to UIPasteboard.general. The system clipboard is accessible to all
    apps on the device. Avoid writing sensitive values (tokens, passwords, PII) to
    the clipboard, and clear it immediately after use if unavoidable.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-STORAGE-2: The app prevents disclosure of sensitive data to third parties'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  pattern-either:
  - pattern: UIPasteboard.general.string = $VAL
  - pattern: "UIPasteboard.general.setValue($VAL, forPasteboardType: ...)"
  - pattern: UIPasteboard.general.setObjects($OBJ, ...)

- id: appinspect-uipasteboard-read
  message: >-
    App reads from UIPasteboard.general. iOS 16+ notifies users when apps read the
    clipboard without explicit user action (paste). Ensure clipboard access is triggered
    by deliberate user intent and never reads PII silently in the background.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-PRIVACY-1: The app minimizes access to sensitive data and resources'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  pattern-either:
  - pattern: UIPasteboard.general.string
  - pattern: "UIPasteboard.general.value(forPasteboardType: ...)"
  - pattern: "UIPasteboard.general.data(forPasteboardType: ...)"

- id: appinspect-device-identifier-collection
  message: >-
    Device identifier collected without ATT (App Tracking Transparency) consent check.
    IDFA collection requires explicit ATT permission since iOS 14.5. Collecting without
    consent violates App Store guidelines (rule 5.1.2) and GDPR/CCPA.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-359: Exposure of Private Personal Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-PRIVACY-1: The app minimizes access to sensitive data and resources'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  pattern-either:
  - pattern: ASIdentifierManager.shared().advertisingIdentifier
  - pattern: UIDevice.current.identifierForVendor

- id: appinspect-photo-library-unrestricted
  message: >-
    PHPhotoLibrary or UIImagePickerController access without scoped authorization check.
    Use PHAuthorizationStatus.limited (iOS 14+) and request only the minimum necessary
    access level (addOnly vs readWrite) to comply with MASVS-PRIVACY.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: LOW
    category: security
    cwe:
    - 'CWE-272: Least Privilege Violation'
    masvs:
    - 'MASVS-PRIVACY-1: The app minimizes access to sensitive data and resources'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  pattern-either:
  - pattern: PHPhotoLibrary.requestAuthorization { $STATUS in ... }
  - pattern: "PHPhotoLibrary.requestAuthorization(for: .readWrite, handler: ...)"

# --- Deep Links & IPC ---

- id: appinspect-deeplink-no-source-validation
  message: >-
    Universal Link or custom URL scheme handler does not validate the calling app or URL
    origin. Any installed app can invoke a custom scheme. Validate scheme, host, path,
    and parameter format before taking privileged action.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    masvs:
    - 'MASVS-PLATFORM-1: The app uses Inter Process Communication (IPC) mechanisms securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  pattern-regex: 'func scene\([^,)]+,\s*openURLContexts'

- id: appinspect-xpc-no-entitlement-check
  message: >-
    XPC connection established without validating the connecting process's code signature
    or entitlements. An attacker process can impersonate a trusted client. Call
    xpc_connection_get_audit_token and validate the code signing requirement.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: HIGH
    confidence: LOW
    category: security
    cwe:
    - 'CWE-284: Improper Access Control'
    masvs:
    - 'MASVS-PLATFORM-1: The app uses Inter Process Communication (IPC) mechanisms securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - macos
  languages:
  - swift
  patterns:
  - pattern: "NSXPCConnection(serviceName: $NAME)"
  - pattern-not-inside: |
      ... SecTaskCreateWithAuditToken ...

# --- Async / Combine Patterns ---

- id: appinspect-combine-sink-error-swallow
  message: >-
    Combine .sink subscriber silently ignores errors via empty receiveCompletion.
    If the upstream publisher emits an authentication failure, network error, or
    security event, swallowing it can leave the UI in an insecure half-authenticated
    state. Handle errors explicitly.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-390: Detection of Error Condition Without Action'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern: |
    $PUB.sink(receiveCompletion: { _ in }, receiveValue: $HANDLER)

- id: appinspect-async-task-unstructured-sensitive
  message: >-
    Task { } creates an unstructured concurrency task that inherits the actor context
    but not the caller's cancellation scope. Sensitive operations (auth token refresh,
    payment processing) started in unstructured Tasks may complete after the user
    has navigated away, creating race conditions. Prefer structured async/await or
    TaskGroup with explicit cancellation.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: LOW
    category: security
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      Task {
        ...
        $SENSITIVE(...)
        ...
      }
  - metavariable-regex:
      metavariable: $SENSITIVE
      regex: (?i).*(auth|login|payment|purchase|token|credential|sign.?in|logout).*

- id: appinspect-actor-nonisolated-sensitive
  message: >-
    nonisolated method on an actor accesses what appears to be sensitive state. nonisolated
    methods bypass actor isolation, making concurrent access to sensitive data possible
    without the actor's serial executor protection.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-regex: 'nonisolated\s+func\s+\w+.*(?:password|token|secret|credential|auth)'

# --- SwiftUI Specific ---

- id: appinspect-swiftui-sensitive-in-snapshot
  message: >-
    View displaying sensitive content (PII, financial data, credentials) should opt out
    of system screenshots and the app switcher snapshot. Apply .privacySensitive() on
    iOS 15+ or redact content with .redacted(reason: .privacy) when the scene phase
    is not .active, to prevent data leakage via the multitasker.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-STORAGE-2: The app prevents disclosure of sensitive data to third parties'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  patterns:
  - pattern-regex: 'Text\(.*(?:password|ssn|credit.?card|account.?number|cvv|pin).*\)'
  - pattern-not-regex: '\.privacySensitive\(\)|\.redacted\('

- id: appinspect-swiftui-environment-credential
  message: >-
    Sensitive credential or token passed through SwiftUI @Environment or EnvironmentObject.
    Environment values are readable from any descendant view and are not access-controlled.
    Use a dedicated service/coordinator injected only where needed.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-STORAGE-2: The app prevents disclosure of sensitive data to third parties'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: '@EnvironmentObject var $VAR: $TYPE'
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(auth|session|credential|token|user|account).*

# --- Notification & Push ---

- id: appinspect-push-payload-logged
  message: >-
    Push notification userInfo payload logged directly. APNs payloads may contain
    one-time tokens, authentication codes, or PII. Logging them exposes this data
    to system logs and crash reporters accessible to other tools.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-532: Insertion of Sensitive Information into Log File'
    masvs:
    - 'MASVS-STORAGE-2: The app prevents disclosure of sensitive data to third parties'
    owasp:
    - M7:2024 - Insufficient Binary Protections
    subcategory:
    - audit
    technology:
    - ios
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: print($NOTIF.userInfo)
    - pattern: NSLog("%@", $NOTIF.userInfo)
    - pattern: print(userInfo)

- id: appinspect-notification-center-sensitive-object
  message: >-
    Sensitive object posted via NotificationCenter. NotificationCenter notifications
    can be observed by any object in the same process, including injected code on
    jailbroken devices. Do not broadcast credentials, tokens, or PII as notification
    objects or userInfo values.
  severity: WARNING
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-PLATFORM-1: The app uses Inter Process Communication (IPC) mechanisms securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: "NotificationCenter.default.post(name: $NAME, object: $OBJ, userInfo: $INFO)"
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*(auth|login|token|credential|session|payment|purchase).*

# --- WebView ---

- id: appinspect-wkwebview-load-local-file
  message: >-
    WKWebView loading from a local file:// URL. Loading local files grants the WebView
    broad filesystem read access within the allowed directory. Use loadFileURL(_:allowingReadAccessTo:)
    with the most restrictive directory possible, never the app's entire bundle or container root.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)'
    masvs:
    - 'MASVS-PLATFORM-2: The app uses WebViews securely'
    owasp:
    - M8:2024 - Security Misconfiguration
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: "$WV.loadFileURL($URL, allowingReadAccessTo: Bundle.main.bundleURL)"
  - pattern: $WV.load($REQUEST)

- id: appinspect-wkscriptmessage-no-origin-check
  message: >-
    WKScriptMessageHandler receives messages without validating the source frame URL.
    Malicious content loaded in the WebView (via XSS or a compromised third-party resource)
    can call any registered handler name. Validate message.frameInfo.request.url before
    processing the message body.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-20: Improper Input Validation'
    masvs:
    - 'MASVS-PLATFORM-2: The app uses WebViews securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: |
      func userContentController(_ $UC: WKUserContentController, didReceive $MSG: WKScriptMessage) {
        ...
      }
  - pattern-not-inside: |
      ... $MSG.frameInfo ...

- id: appinspect-wkwebview-evaluate-js-user-input
  message: >-
    User-controlled string passed to evaluateJavaScript. This is equivalent to eval()
    in the context of the loaded page and can execute arbitrary JavaScript, including
    exfiltrating cookies, localStorage, or calling native bridges.
  severity: ERROR
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-94: Improper Control of Generation of Code (Code Injection)'
    masvs:
    - 'MASVS-PLATFORM-2: The app uses WebViews securely'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: $WV.evaluateJavaScript($SCRIPT, ...)

# --- Core Data / CloudKit ---

- id: appinspect-coredata-no-encryption
  message: >-
    NSPersistentStore added without NSPersistentStoreFileProtectionKey. Core Data SQLite
    stores are not encrypted at rest by default. Add NSPersistentStoreFileProtectionKey:
    FileProtectionType.complete to the store options for sensitive data.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-311: Missing Encryption of Sensitive Data'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: $CONTAINER.persistentStoreDescriptions
    - pattern: "try $COORDINATOR.addPersistentStore(ofType: NSSQLiteStoreType, configurationName: $CONF, at: $URL, options: $OPTS)"
  - pattern-not-inside: |
      ... NSPersistentStoreFileProtectionKey ...

- id: appinspect-cloudkit-plaintext-sensitive
  message: >-
    CloudKit record field name matches a sensitive data pattern. CloudKit stores data
    in Apple's servers. Ensure sensitive fields are encrypted client-side before being
    written to CKRecord, especially on .publicDatabase.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M9:2024 - Insecure Data Storage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: $RECORD["$FIELD"] = $VALUE
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(password|ssn|credit|card|secret|token|dob|birth|salary|medical|health).*

# --- Runtime Integrity ---

- id: appinspect-ptrace-anti-debug
  message: >-
    ptrace(PT_DENY_ATTACH) anti-debugging technique detected. While this can deter
    casual debugger attachment, it is bypassable and may cause App Store review rejection.
    Implement defence-in-depth rather than relying solely on anti-debugging.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-656: Reliance on Security Through Obscurity'
    masvs:
    - 'MASVS-RESILIENCE-2: The app implements anti-debugging mechanisms'
    owasp:
    - M7:2024 - Insufficient Binary Protections
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: ptrace(PT_DENY_ATTACH, 0, 0, 0)
  - pattern: syscall(SYS_ptrace, PT_DENY_ATTACH, 0, 0, 0)

- id: appinspect-class-dump-risk-objc-exposure
  message: >-
    Swift class with @objc annotation exposes its interface to the Objective-C runtime.
    On a jailbroken device class-dump can enumerate all @objc methods and properties,
    including those handling credentials or auth tokens. Minimize @objc surface on
    security-sensitive types.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: LOW
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-RESILIENCE-1: The app validates the integrity of the platform'
    owasp:
    - M7:2024 - Insufficient Binary Protections
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern: '@objc class $CLASS: $BASE { ... }'
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(auth|login|session|credential|payment|token|vault|secret).*

# --- Supply Chain & Third-party SDKs ---

- id: appinspect-third-party-sdk-network-call
  message: >-
    Network request initiated from a third-party analytics or ad SDK integration point.
    Verify the SDK's privacy policy and data collection practices. Ensure the SDK is
    initialized only after obtaining user consent and does not phone home before consent.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    category: security
    cwe:
    - 'CWE-359: Exposure of Private Personal Information to an Unauthorized Actor'
    masvs:
    - 'MASVS-PRIVACY-2: The app only collects and shares data that is directly needed for app functionality'
    owasp:
    - M2:2024 - Inadequate Supply Chain Security
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-regex: '(?i)(Mixpanel\.initialize|AppLovin|Adjust\.appDidLaunch|Branch\.getInstance|Amplitude\.instance|Segment\.setup|mParticle\.start)'

- id: appinspect-googleservice-plist-reference
  message: >-
    GoogleService-Info.plist referenced in code. This file contains Firebase API keys and
    project identifiers. Ensure it is added to .gitignore and not committed to version
    control. Rotate keys if the file has been previously exposed.
  severity: WARNING
  metadata:
    likelihood: HIGH
    impact: MEDIUM
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    masvs:
    - 'MASVS-STORAGE-1: The app securely stores sensitive data'
    owasp:
    - M1:2024 - Improper Credential Usage
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-regex: '"GoogleService-Info\.plist"'

# --- Error Handling & Crash Safety ---

- id: appinspect-sensitive-data-in-error-description
  message: >-
    Error localizedDescription or failureReason may be derived from sensitive data.
    Error messages propagated to UI or logs can expose internal state, API responses,
    or server error details that aid attackers in reconnaissance.
  severity: INFO
  metadata:
    likelihood: LOW
    impact: LOW
    confidence: LOW
    category: security
    cwe:
    - 'CWE-209: Generation of Error Message Containing Sensitive Information'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - audit
    technology:
    - ios
    - macos
  languages:
  - swift
  patterns:
  - pattern-either:
    - pattern: Text(error.localizedDescription)
    - pattern: print(error.localizedDescription)
    - pattern: fatalError(error.localizedDescription)

- id: appinspect-assert-in-release
  message: >-
    assert() and assertionFailure() are stripped in release builds (they compile to
    nothing when optimizations are enabled). Security checks written as assert() calls
    silently disappear in production. Use guard/precondition for invariants that must
    hold in release builds.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    category: security
    cwe:
    - 'CWE-617: Reachable Assertion'
    masvs:
    - 'MASVS-CODE-4: The app validates and sanitizes all untrusted inputs'
    owasp:
    - M4:2024 - Insufficient Input/Output Validation
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: assert($COND, ...)
  - pattern: assertionFailure(...)

