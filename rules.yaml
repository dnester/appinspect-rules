# ===================================================
# Clear Text Logging (CWE-200, CWE-312)
# ===================================================

- id: swift-cleartext-logging-sensitive
  message: >-
    Sensitive data may be written to logs in cleartext. Log statements containing
    passwords, tokens, keys, or other secrets are readable by anyone with device
    access or log collection tools. Remove or redact sensitive values before logging.
  severity: ERROR
  metadata:
    likelihood: HIGH
    impact: HIGH
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-200: Exposure of Sensitive Information to an Unauthorized Actor'
    - 'CWE-312: Cleartext Storage of Sensitive Information'
    owasp:
    - A01:2021 - Broken Access Control
    - A04:2021 - Insecure Design
    subcategory:
    - vuln
    technology:
    - ios
    - macos
  languages:
  - swift
  pattern-either:
  - pattern: print("...", $VAR, ...)
  - pattern: NSLog("...", $VAR, ...)
  - pattern: os_log("...", $VAR, ...)
  - pattern: Logger().$LEVEL("...\($VAR)...")
  - patterns:
    - pattern: print($MSG)
    - metavariable-regex:
        metavariable: $MSG
        regex: (?i).*(password|passwd|secret|token|key|credential|auth|ssn|cvv|pin).*

- id: swift-cleartext-logging-interpolation
  message: >-
    String interpolation in a log call may expose sensitive runtime values in plaintext.
    Ensure that passwords, tokens, or keys are never interpolated directly into log messages.
  severity: WARNING
  metadata:
    likelihood: MEDIUM
    impact: HIGH
    confidence: LOW
    category: security
